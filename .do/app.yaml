name: my-worker
region: nyc
features:
  - buildpack-stack=ubuntu-22

services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - name: backend
    github:
      repo: dinnewton/my-worker
      branch: main
      deploy_on_push: true
    source_dir: backend
    dockerfile_path: backend/Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 10
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${my-worker-db.DATABASE_URL}
      - key: REDIS_URL
        scope: RUN_TIME
        value: ${my-worker-redis.REDIS_URL}
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: ""            # Set this in the DO dashboard
      - key: CLAUDE_MODEL
        scope: RUN_TIME
        value: claude-sonnet-4-6
      - key: ALLOWED_ORIGINS
        scope: RUN_TIME
        value: ${frontend.PUBLIC_URL}
      - key: SECRET_KEY
        scope: RUN_TIME
        type: SECRET
        value: ""            # Set a random 32-char string in DO dashboard
      - key: ENVIRONMENT
        scope: RUN_TIME
        value: production
      # Social media keys — optional, fill to enable real posting
      - key: META_PAGE_ACCESS_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: ""
      - key: META_PAGE_ID
        scope: RUN_TIME
        value: ""
      - key: META_IG_USER_ID
        scope: RUN_TIME
        value: ""
      - key: LINKEDIN_ACCESS_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: ""
      - key: LINKEDIN_PERSON_URN
        scope: RUN_TIME
        value: ""
      - key: TIKTOK_ACCESS_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: ""
      - key: TWITTER_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: ""
      - key: TWITTER_API_SECRET
        scope: RUN_TIME
        type: SECRET
        value: ""
      - key: TWITTER_ACCESS_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: ""
      - key: TWITTER_ACCESS_SECRET
        scope: RUN_TIME
        type: SECRET
        value: ""
    routes:
      - path: /api
      - path: /ws
      - path: /health

  # ── Frontend ─────────────────────────────────────────────────────────────────
  - name: frontend
    github:
      repo: dinnewton/my-worker
      branch: main
      deploy_on_push: true
    source_dir: frontend
    dockerfile_path: frontend/Dockerfile
    http_port: 80
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: VITE_API_URL
        scope: BUILD_TIME
        value: ${backend.PUBLIC_URL}/api/v1
      - key: VITE_WS_URL
        scope: BUILD_TIME
        value: ${backend.PUBLIC_URL}
    routes:
      - path: /

# ── Managed Databases ────────────────────────────────────────────────────────
databases:
  - name: my-worker-db
    engine: PG
    version: "15"
    size: db-s-dev-database    # Free dev DB — upgrade to db-s-1vcpu-1gb for prod
    num_nodes: 1

  - name: my-worker-redis
    engine: REDIS
    version: "7"
    size: db-s-dev-database    # Free dev Redis
    num_nodes: 1
